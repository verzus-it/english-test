<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title><%= htmlWebpackPlugin.options.title %></title>
    <script type="text/javascript" >
		var base;
		switch (window.location.hostname){
			case 'amakids.ru':
            case 'amakids.com':
            case 'amakids.site':
            case 'amaclass.ru':
				base = '/platform/apps/introTests/';
				break;

			case 'localhost':
				base = window.location.port ? '/' : '/apps/introTests/';
				break;

			default:
				base = '/apps/introTests/';
		}

		document.write('<base href="' + base + '"/>');
    </script>
</head>
<body>
    <main id="app"></main>
</body>
</html>
